<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in — SDCS Ledger</title>
    <link rel="stylesheet" href="/static/css/home.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="/static/img/sdcs_logo.png">
    <style>
        body { background: var(--bg-alt); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-wrapper { width: 100%; max-width: 440px; padding: 2rem; }
        .login-logo { display: flex; justify-content: center; margin-bottom: 2rem; }
        .login-logo img { width: 3rem; height: 3rem; border-radius: 50%; box-shadow: var(--shadow-sm); }
        .login-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; box-shadow: var(--shadow-md); }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        .login-header p { font-size: 0.9375rem; color: var(--muted); }
        .login-form .form-group { margin-bottom: 1.25rem; }
        .login-form .form-group label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
        .login-form .input-with-icon { position: relative; }
        .login-form .input-with-icon i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--muted); }
        .login-form .input-with-icon input { width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border: 1px solid var(--border); border-radius: 6px; font-family: var(--font); font-size: 0.9375rem; transition: border-color 0.2s; }
        .login-form .input-with-icon input:focus { outline: none; border-color: var(--green); }
        .btn-login { width: 100%; padding: 0.875rem; font-size: 1rem; justify-content: center; margin-top: 0.5rem; }
        .error-msg { background: #FEF2F2; border: 1px solid #FECACA; color: #DC2626; border-radius: 6px; padding: 0.875rem 1rem; font-size: 0.875rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
        .login-footer { text-align: center; margin-top: 2rem; font-size: 0.875rem; color: var(--muted); }
        .login-footer code { background: var(--green-bg); color: var(--green-dark); padding: 0.2rem 0.4rem; border-radius: 4px; font-weight: 600; }
        .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--muted); font-size: 0.875rem; font-weight: 500; transition: color 0.2s; margin-bottom: 2rem; }
        .back-link:hover { color: var(--text); }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <a href="/" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        
        <div class="login-logo">
            <img src="/static/img/sdcs_logo.png" alt="SDCS Ledger">
        </div>
        
        <div class="login-card">
            <div class="login-header">
                <h1>Log in to your ledger</h1>
                <p>Enter your phone number and 4-digit PIN</p>
            </div>
            
            {% if error %}
            <div class="error-msg">
                <i class="fa-solid fa-circle-exclamation"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/api/auth/login" class="login-form">
                <div class="form-group">
                    <label>WhatsApp Phone Number</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" name="phone" placeholder="e.g. 2348012345678" required autofocus>
                    </div>
                </div>
                <div class="form-group">
                    <label>4-Digit PIN</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" name="pin" placeholder="••••" maxlength="4" pattern="\d{4}" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-login">
                    Access My Ledger
                </button>
            </form>
        </div>
        
        <div class="login-footer">
            Don't have a PIN yet? Message the bot:<br>
            <code>pin 1234</code> (replace 1234 with your chosen PIN)
        </div>
    </div>
</body>
</html>
