<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDCS Ledger — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/static/css/index.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: auto; }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            position: relative;
            z-index: 1;
        }
        .login-brand { text-align: center; margin-bottom: 32px; }
        .login-brand i { font-size: 48px; color: var(--accent-green); display: block; margin-bottom: 12px; }
        .login-brand h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.03em; }
        .login-brand p { font-size: 0.9rem; color: var(--text-secondary); margin-top: 6px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
        .input-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            transition: border-color 0.2s;
        }
        .input-wrap:focus-within { border-color: rgba(37, 211, 102, 0.5); }
        .input-wrap i { color: var(--text-muted); font-size: 18px; }
        .input-wrap input {
            background: none; border: none; outline: none;
            color: var(--text-primary); font-family: 'Outfit', sans-serif;
            font-size: 1rem; width: 100%;
        }
        .input-wrap input::placeholder { color: var(--text-muted); }
        .btn-login {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #25d366, #1da851);
            color: #fff; font-family: 'Outfit', sans-serif;
            font-size: 1rem; font-weight: 700;
            border: none; border-radius: 12px; cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
        .error-msg {
            background: rgba(247, 127, 127, 0.1);
            border: 1px solid rgba(247, 127, 127, 0.3);
            color: #f77f7f;
            border-radius: 10px; padding: 12px 16px;
            font-size: 0.875rem; margin-bottom: 18px;
            display: flex; align-items: center; gap: 8px;
        }
        .footer-hint { text-align: center; margin-top: 24px; color: var(--text-muted); font-size: 0.8rem; line-height: 1.6; }
        .footer-hint code { color: var(--accent-green); background: rgba(37,211,102,0.1); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>

    <div class="login-card glass-panel">
        <div class="login-brand">
            <i class="ph ph-ghost"></i>
            <h1>SDCS Ledger</h1>
            <p>Sign in to view your personal ledger</p>
        </div>

        {% if error %}
        <div class="error-msg">
            <i class="ph ph-warning-circle"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/api/auth/login">
            <div class="form-group">
                <label>WhatsApp Phone Number</label>
                <div class="input-wrap">
                    <i class="ph ph-phone"></i>
                    <input type="tel" name="phone" placeholder="e.g. 2348012345678" required autofocus>
                </div>
            </div>
            <div class="form-group">
                <label>4-Digit PIN</label>
                <div class="input-wrap">
                    <i class="ph ph-lock"></i>
                    <input type="password" name="pin" placeholder="••••" maxlength="4" pattern="\d{4}" required>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="ph ph-sign-in"></i> Access My Ledger
            </button>
        </form>

        <p class="footer-hint">
            Don't have a PIN yet? Message the bot:<br>
            <code>pin 1234</code> (replace 1234 with your chosen PIN)
        </p>
    </div>
</body>
</html>
